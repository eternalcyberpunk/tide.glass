<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tideglass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<!-- =========================================================
     TIDEGLASS — v1
     Setup (one-time):
       1. Create a Supabase project at supabase.com
       2. In the SQL Editor, paste + run the contents of schema.sql
       3. In Project Settings → API, copy the Project URL and anon/public key
       4. Paste them below where marked, then redeploy
     Without credentials, the app runs on seed data (read-only).
     ========================================================= -->

<style>
:root {
  /* Abyssal palette */
  --bg0: #05060f;
  --bg1: #0a0e22;
  --bg2: #12143a;
  --ink: #e8ecff;
  --mute: rgba(232, 236, 255, 0.55);
  --dim: rgba(232, 236, 255, 0.28);
  --faint: rgba(232, 236, 255, 0.10);
  --accent: #9ab4ff;
  --accent2: #ff9ad1;
  --warn: #ffb37a;
  --iris: conic-gradient(from 140deg at 50% 50%,
    #6be0ff 0%, #a389ff 18%, #ff7ac8 35%,
    #ffd36b 52%, #6effc7 70%, #6be0ff 100%);
  --tide: linear-gradient(90deg,
    rgba(106,224,255,0) 0%,
    rgba(106,224,255,0.45) 25%,
    rgba(163,137,255,0.55) 50%,
    rgba(255,122,200,0.35) 75%,
    rgba(106,224,255,0) 100%);
  --serif: 'Instrument Serif', 'Iowan Old Style', Georgia, serif;
  --mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;
  --tabh: 72px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  width: 100%;
  overflow-x: hidden;
  background: var(--bg0);
  color: var(--ink);
  font-family: var(--serif);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background:
    radial-gradient(ellipse at 30% 20%, var(--bg2) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, #1a1040 0%, transparent 50%),
    var(--bg0);
  background-attachment: fixed;
}

/* ---------- ambient drifting blobs ---------- */
.ambient {
  position: fixed; inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  mix-blend-mode: screen;
}
.blob.b1 {
  width: 560px; height: 560px;
  top: -120px; left: -120px;
  background: radial-gradient(circle, #6be0ff 0%, transparent 70%);
  animation: drift1 24s ease-in-out infinite alternate;
}
.blob.b2 {
  width: 640px; height: 640px;
  bottom: -180px; right: -160px;
  background: radial-gradient(circle, #ff7ac8 0%, transparent 70%);
  animation: drift2 32s ease-in-out infinite alternate;
}
.blob.b3 {
  width: 420px; height: 420px;
  top: 40%; left: 60%;
  background: radial-gradient(circle, #a389ff 0%, transparent 70%);
  animation: drift1 40s ease-in-out infinite alternate-reverse;
}
@keyframes drift1 {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(80px, 60px) scale(1.2); }
}
@keyframes drift2 {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(-100px, -40px) scale(1.15); }
}

.stars {
  position: fixed; inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 90% 15%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.35), transparent);
  opacity: 0.5;
  pointer-events: none;
  z-index: 1;
}

/* ---------- app shell ---------- */
.app {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.main {
  flex: 1;
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 20px calc(var(--tabh) + 40px);
}

/* ---------- typography ---------- */
.mono {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.serif-it { font-family: var(--serif); font-style: italic; }
.dim { color: var(--dim); }
.muted { color: var(--mute); }

.iris-text {
  background: var(--iris);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: shift 18s linear infinite;
}
@keyframes shift {
  0%   { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

/* ---------- feed header ---------- */
.feed-header {
  padding: 20px 4px 32px;
  animation: rise 0.8s cubic-bezier(.2,.7,.2,1) both;
}
.feed-header .eyebrow {
  color: var(--mute);
  margin-bottom: 14px;
}
.feed-header h1 {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(40px, 7vw, 64px);
  line-height: 1.05;
  font-weight: 400;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
.feed-header .sub {
  font-family: var(--serif);
  font-size: 17px;
  color: var(--mute);
  line-height: 1.5;
  max-width: 480px;
}

.rule {
  height: 1px;
  background: var(--tide);
  background-size: 240% 100%;
  animation: tide 14s linear infinite;
  opacity: 0.7;
  margin: 24px 0;
}
@keyframes tide {
  0%   { background-position: 0% 0; }
  100% { background-position: 240% 0; }
}

/* ---------- wave section ---------- */
.wave {
  margin-bottom: 56px;
  animation: rise 1s cubic-bezier(.2,.7,.2,1) both;
}
.wave-meta {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 10px;
  padding: 0 4px;
}
.wave-meta .current {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 0.5px;
}
.wave-meta .phase {
  color: var(--mute);
  font-size: 9px;
  font-family: var(--mono);
  letter-spacing: 2px;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
}
.wave-meta .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
  animation: pulse 2.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.7); }
}

.wave-title {
  font-family: var(--serif);
  font-size: 34px;
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  padding: 0 4px;
}
.wave-sub {
  font-family: var(--serif);
  font-style: italic;
  color: var(--mute);
  font-size: 17px;
  line-height: 1.4;
  padding: 0 4px;
  margin-bottom: 20px;
}
.wave-band {
  height: 2px;
  border-radius: 2px;
  background: var(--tide);
  background-size: 240% 100%;
  animation: tide 10s linear infinite;
  margin: 0 4px 22px;
  opacity: 0.8;
}

/* ---------- node card ---------- */
.nodes {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.node {
  position: relative;
  padding: 22px 22px 18px;
  border-radius: 22px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
    rgba(10, 14, 34, 0.5);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border: 1px solid var(--faint);
  transition: border-color 0.4s, transform 0.3s;
  overflow: hidden;
}
.node::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 22px;
  padding: 1px;
  background: var(--iris);
  background-size: 200% 200%;
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  opacity: 0.15;
  pointer-events: none;
  animation: shift 20s linear infinite;
}
.node:hover {
  border-color: rgba(154, 180, 255, 0.3);
  transform: translateY(-1px);
}
.node-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.node-kind {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 4px;
  background: rgba(154, 180, 255, 0.1);
  color: var(--accent);
}
.node-kind.question { background: rgba(255, 154, 209, 0.1); color: var(--accent2); }
.node-kind.seed     { background: rgba(255, 179, 122, 0.1); color: var(--warn); }

.node-author {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--mute);
}

.node-body {
  font-family: var(--serif);
  font-size: 19px;
  line-height: 1.45;
  color: var(--ink);
  white-space: pre-wrap;
  word-wrap: break-word;
}
.node-body.question {
  font-style: italic;
  color: rgba(255, 154, 209, 0.95);
}

.node-foot {
  margin-top: 14px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 14px;
}
.node-depth {
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}
.node-depth span {
  display: block;
  height: 100%;
  background: var(--iris);
  border-radius: 2px;
}

/* ---------- empty / loading / banner ---------- */
.empty {
  text-align: center;
  padding: 40px 24px;
  color: var(--mute);
  font-family: var(--serif);
  font-style: italic;
  font-size: 17px;
}
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 80px 0;
  color: var(--mute);
  font-family: var(--mono);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-size: 10px;
}
.loading::before {
  content: '';
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent);
  margin-right: 10px;
  animation: pulse 1.2s ease-in-out infinite;
}

.banner {
  margin-bottom: 32px;
  padding: 18px 20px;
  border-radius: 16px;
  background: rgba(255, 179, 122, 0.08);
  border: 1px solid rgba(255, 179, 122, 0.25);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 15px;
  line-height: 1.5;
}
.banner .label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--warn);
  margin-bottom: 6px;
  display: block;
}
.banner code {
  font-family: var(--mono);
  font-size: 12px;
  background: rgba(0,0,0,0.3);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--warn);
}

/* ---------- tab bar ---------- */
.tab-bar {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px;
  border-radius: 999px;
  background: rgba(10, 14, 34, 0.65);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}
.tab {
  background: transparent;
  border: none;
  color: var(--mute);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 18px;
  border-radius: 999px;
  cursor: pointer;
  transition: color 0.25s, background 0.25s;
}
.tab:hover { color: var(--ink); }
.tab.active {
  color: var(--ink);
  background: rgba(154, 180, 255, 0.12);
}
.tab.compose-btn {
  width: 44px; height: 44px;
  padding: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--iris);
  background-size: 200% 200%;
  animation: shift 12s linear infinite;
  color: #05060f;
  font-size: 22px;
  font-family: var(--serif);
  line-height: 1;
}
.tab.compose-btn:hover { color: #000; }

/* ---------- compose overlay ---------- */
.compose-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(5, 6, 15, 0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex;
  flex-direction: column;
  animation: fade 0.35s ease both;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }

.compose-inner {
  flex: 1;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
  padding: 32px 20px 40px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.compose-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}
.c-cancel, .c-release {
  background: transparent;
  border: none;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  padding: 10px 16px;
  border-radius: 999px;
}
.c-cancel { color: var(--mute); }
.c-cancel:hover { color: var(--ink); }
.c-release {
  background: var(--iris);
  color: #05060f;
  font-weight: 600;
  transition: filter 0.2s, opacity 0.2s;
}
.c-release:hover:not(:disabled) { filter: saturate(1.4); }
.c-release:disabled {
  background: rgba(255,255,255,0.05);
  color: var(--dim);
  cursor: not-allowed;
}

.c-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mute);
  margin-bottom: 12px;
  padding-left: 4px;
}
.c-row { margin-bottom: 26px; }

.pill-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.pill {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--faint);
  color: var(--ink);
  padding: 8px 14px;
  border-radius: 16px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  cursor: pointer;
  transition: border-color 0.25s, background 0.25s, font-style 0.25s;
}
.pill:hover { border-color: rgba(154,180,255,0.3); }
.pill.active {
  border-color: var(--accent);
  background: rgba(154,180,255,0.12);
  font-style: normal;
}

.kind-group { display: flex; gap: 8px; }
.kind-btn {
  flex: 1;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--faint);
  padding: 14px 12px;
  border-radius: 16px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.25s, background 0.25s;
}
.kind-btn:hover { border-color: rgba(154,180,255,0.3); }
.kind-btn.active {
  background: rgba(154,180,255,0.1);
  border-color: var(--accent);
}
.kind-btn .k-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 4px;
  display: block;
}
.kind-btn .k-desc {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--mute);
}

.c-textarea {
  width: 100%;
  min-height: 180px;
  background: rgba(10,14,34,0.5);
  border: 1px solid var(--faint);
  border-radius: 20px;
  color: var(--ink);
  font-family: var(--serif);
  font-size: 20px;
  line-height: 1.5;
  padding: 22px;
  resize: vertical;
  outline: none;
  transition: border-color 0.3s;
}
.c-textarea:focus { border-color: rgba(154,180,255,0.4); }
.c-textarea::placeholder {
  color: var(--dim);
  font-style: italic;
}

.c-handle {
  width: 100%;
  background: rgba(10,14,34,0.5);
  border: 1px solid var(--faint);
  border-radius: 12px;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.3s;
  letter-spacing: 0.5px;
}
.c-handle:focus { border-color: rgba(154,180,255,0.4); }

.c-count {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--dim);
  margin-top: 8px;
  text-align: right;
}

/* ---------- toast ---------- */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  padding: 12px 20px;
  border-radius: 999px;
  background: rgba(10,14,34,0.9);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translate(-50%, 8px);
}

/* ---------- you view ---------- */
.you-view {
  padding-top: 40px;
  animation: rise 0.8s cubic-bezier(.2,.7,.2,1) both;
}
.you-view .constellation {
  font-family: var(--serif);
  font-style: italic;
  font-size: 42px;
  line-height: 1.1;
  margin-bottom: 12px;
}
.you-view .meta {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--mute);
  margin-bottom: 32px;
}
.you-view .handle-card {
  padding: 24px;
  border-radius: 20px;
  background: rgba(10,14,34,0.5);
  border: 1px solid var(--faint);
  backdrop-filter: blur(12px);
}

/* ---------- animations ---------- */
@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---------- mobile ---------- */
@media (max-width: 640px) {
  .main { padding: 32px 16px calc(var(--tabh) + 32px); }
  .feed-header h1 { font-size: 44px; }
  .wave-title { font-size: 28px; }
  .node-body { font-size: 17px; }
  .kind-group { flex-direction: column; }
}
</style>
</head>

<body>
  <div class="ambient">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div class="stars"></div>

  <div class="app">
    <main class="main" id="main">
      <div class="loading">opening the tide</div>
    </main>
  </div>

  <nav class="tab-bar" id="tabBar" hidden>
    <button class="tab active" data-view="feed">home</button>
    <button class="tab compose-btn" data-view="compose" aria-label="compose">+</button>
    <button class="tab" data-view="you">you</button>
  </nav>

  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    depth: 0.65 },
  { id: 'n3', wave_id: 'w-repair', author_handle: 'kofi —', kind: 'seed',
    body: "my grandmother darned socks until the sock was more darn than sock. she called it \"the conversation.\" every hole a sentence.",
    depth: 0.85 },
  { id: 'n4', wave_id: 'w-repair', author_handle: 'lune', kind: 'fragment',
    body: "repaired things remember being broken. that's not a flaw. that's a body of knowledge.",
    depth: 0.7 },
  { id: 'n5', wave_id: 'w-commons', author_handle: 'tendril', kind: 'seed',
    body: "the library. the public bench. the drinking fountain. the shade of a tree planted by someone who'd never meet you.",
    depth: 0.6 },
  { id: 'n6', wave_id: 'w-dusk', author_handle: 'phosphene', kind: 'fragment',
    body: "the sky right now — cobalt going to plum. if you're reading this, go outside for 90 seconds.",
    depth: 0.2 },
];

/* ============================================================
   INIT / DATA
   ============================================================ */
async function init() {
  try {
    if (SUPABASE_URL && SUPABASE_ANON_KEY) {
      state.client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const { data: sess } = await state.client.auth.getSession();
      if (sess.session) {
        state.user = sess.session.user;
      } else {
        const { data, error } = await state.client.auth.signInAnonymously();
        if (error) throw error;
        state.user = data.user;
      }

      await Promise.all([loadWaves(), loadNodes()]);
      state.connected = true;
    } else {
      state.waves = SEED_WAVES;
      state.nodes = SEED_NODES;
    }
  } catch (err) {
    console.error('[tideglass] init failed:', err);
    state.error = err.message || String(err);
    state.waves = SEED_WAVES;
    state.nodes = SEED_NODES;
  } finally {
    state.loading = false;
    document.getElementById('tabBar').hidden = false;
    render();
  }
}

async function loadWaves() {
  const { data, error } = await state.client
    .from('waves')
    .select('*')
    .order('depth', { ascending: false });
  if (error) throw error;
  state.waves = data || [];
}

async function loadNodes() {
  const { data, error } = await state.client
    .from('nodes')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(120);
  if (error) throw error;
  state.nodes = data || [];
}

async function publishNode({ body, kind, wave_id, handle }) {
  if (!state.client) {
    toast('connect a database to publish');
    return false;
  }
  const payload = {
    body: body.trim(),
    kind,
    wave_id,
    author_id: state.user?.id || null,
    author_handle: (handle || 'anon').trim().toLowerCase().slice(0, 24),
  };
  const { data, error } = await state.client
    .from('nodes')
    .insert(payload)
    .select()
    .single();
  if (error) {
    console.error(error);
    toast('could not release');
    return false;
  }
  state.nodes = [data, ...state.nodes];
  return true;
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  const main = document.getElementById('main');
  if (state.loading) {
    main.innerHTML = '<div class="loading">opening the tide</div>';
    return;
  }
  if (state.view === 'feed')    main.innerHTML = feedView();
  if (state.view === 'compose') renderCompose();
  if (state.view === 'you')     main.innerHTML = youView();

  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === state.view);
  });
}

function feedView() {
  const phaseText = currentPhaseLabel();
  const banner = state.connected
    ? ''
    : `<div class="banner">
         <span class="label">${state.error ? 'connection issue' : 'read-only preview'}</span>
         You're seeing seed data. Add your Supabase <code>URL</code> and <code>anon key</code> near the top of <code>index.html</code> to go live.
       </div>`;

  const waveBlocks = state.waves.map(w => {
    const ns = state.nodes.filter(n => n.wave_id === w.id);
    const quietDot = w.phase === 'receding' ? 'style="animation:none;opacity:0.4"' : '';
    return `
      <section class="wave">
        <div class="wave-meta">
          <div class="current">${esc(w.current)}</div>
          <div class="phase"><span class="dot" ${quietDot}></span>${esc(w.phase || 'rising')}</div>
        </div>
        <h2 class="wave-title">${esc(w.current)}</h2>
        <p class="wave-sub">${esc(w.subtitle || '')}</p>
        <div class="wave-band" style="opacity:${0.3 + (Number(w.depth) || 0.5) * 0.6}"></div>
        <div class="nodes">
          ${ns.length === 0
            ? `<div class="empty">the current is quiet. drop a node.</div>`
            : ns.map(nodeCard).join('')
          }
        </div>
      </section>
    `;
  }).join('');

  return `
    ${banner}
    <header class="feed-header">
      <div class="eyebrow mono">tideglass · the ${phaseText} hour</div>
      <h1 class="iris-text">what moves through us</h1>
      <p class="sub">no counts, no clocks, no infinite scroll. currents rise and recede. drift, don't doom.</p>
    </header>
    <div class="rule"></div>
    ${waveBlocks || '<div class="empty">no currents yet. be the first tide.</div>'}
  `;
}

function nodeCard(n) {
  const depth = Math.max(0.05, Math.min(1, Number(n.depth) || 0.5));
  const kind = esc(n.kind || 'fragment');
  return `
    <article class="node">
      <div class="node-head">
        <span class="node-kind ${kind}">${kind}</span>
        <span class="node-author">${esc(n.author_handle || 'anon')}</span>
      </div>
      <div class="node-body ${kind === 'question' ? 'question' : ''}">${esc(n.body)}</div>
      <div class="node-foot">
        <div class="node-depth"><span style="width:${(depth * 100).toFixed(0)}%"></span></div>
      </div>
    </article>
  `;
}

function youView() {
  const count = state.nodes.filter(n => n.author_id && n.author_id === state.user?.id).length;
  return `
    <div class="you-view">
      <div class="mono dim" style="margin-bottom:14px">your constellation</div>
      <h1 class="constellation iris-text">unnamed, still forming</h1>
      <div class="meta">
        ${state.connected ? `session active · ${count} node${count === 1 ? '' : 's'} released` : 'not connected'}
      </div>
      <div class="handle-card">
        <div class="mono dim" style="margin-bottom:10px">identifier</div>
        <div style="font-family:var(--mono); font-size:13px; color:var(--mute); word-break:break-all">
          ${state.user?.id ? esc(state.user.id) : 'anonymous — not signed in'}
        </div>
      </div>
      <p class="serif-it" style="color:var(--mute); margin-top:24px; font-size:17px; line-height:1.5">
        profiles, orbits, and your node graph arrive in the next tide.
      </p>
    </div>
  `;
}

/* ============================================================
   COMPOSE
   ============================================================ */
const composeState = {
  body: '',
  kind: 'fragment',
  wave_id: null,
  handle: '',
};

function renderCompose() {
  if (!composeState.wave_id && state.waves[0]) {
    composeState.wave_id = state.waves[0].id;
  }
  document.getElementById('composeOverlay')?.remove();

  const kinds = [
    { id: 'fragment', label: 'FRAG', desc: 'a thought, a shard' },
    { id: 'question', label: 'ASK',  desc: 'an open wondering' },
    { id: 'seed',     label: 'SEED', desc: 'meant to be tended' },
  ];

  const overlay = document.createElement('div');
  overlay.className = 'compose-overlay';
  overlay.id = 'composeOverlay';
  overlay.innerHTML = `
    <div class="compose-inner">
      <div class="compose-head">
        <button class="c-cancel" id="cCancel">✕ cancel</button>
        <div class="mono dim">drop a node</div>
        <button class="c-release" id="cRelease" disabled>release →</button>
      </div>

      <div class="c-row">
        <div class="c-label">kind</div>
        <div class="kind-group">
          ${kinds.map(k => `
            <button class="kind-btn ${composeState.kind === k.id ? 'active' : ''}" data-kind="${k.id}">
              <span class="k-label">${k.label}</span>
              <span class="k-desc">${k.desc}</span>
            </button>
          `).join('')}
        </div>
      </div>

      <div class="c-row">
        <div class="c-label">ride which current</div>
        <div class="pill-group">
          ${state.waves.map(w => `
            <button class="pill ${composeState.wave_id === w.id ? 'active' : ''}" data-wave="${w.id}">
              ${esc(w.current)}
            </button>
          `).join('')}
        </div>
      </div>

      <div class="c-row" style="flex:1">
        <div class="c-label">the node</div>
        <textarea class="c-textarea" id="cBody"
          placeholder="a fragment, a question, a seed…">${esc(composeState.body)}</textarea>
        <div class="c-count"><span id="cCount">0</span> / 600</div>
      </div>

      <div class="c-row">
        <div class="c-label">handle (optional)</div>
        <input class="c-handle" id="cHandle" value="${esc(composeState.handle)}"
          placeholder="you ·" maxlength="24">
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const bodyEl    = document.getElementById('cBody');
  const handleEl  = document.getElementById('cHandle');
  const countEl   = document.getElementById('cCount');
  const releaseEl = document.getElementById('cRelease');

  const updateCount = () => {
    const v = bodyEl.value;
    composeState.body = v;
    countEl.textContent = v.length;
    releaseEl.disabled = v.trim().length < 10 || v.length > 600;
  };
  updateCount();

  bodyEl.addEventListener('input', updateCount);
  handleEl.addEventListener('input', e => { composeState.handle = e.target.value; });

  overlay.addEventListener('click', e => {
    const k = e.target.closest('[data-kind]');
    if (k) {
      composeState.kind = k.dataset.kind;
      overlay.querySelectorAll('[data-kind]').forEach(b =>
        b.classList.toggle('active', b.dataset.kind === composeState.kind));
      return;
    }
    const w = e.target.closest('[data-wave]');
    if (w) {
      composeState.wave_id = w.dataset.wave;
      overlay.querySelectorAll('[data-wave]').forEach(b =>
        b.classList.toggle('active', b.dataset.wave === composeState.wave_id));
    }
  });

  document.getElementById('cCancel').addEventListener('click', closeCompose);
  releaseEl.addEventListener('click', handleRelease);

  setTimeout(() => bodyEl.focus(), 100);
}

async function handleRelease() {
  const release = document.getElementById('cRelease');
  release.disabled = true;
  release.textContent = 'releasing…';

  const ok = await publishNode({
    body: composeState.body,
    kind: composeState.kind,
    wave_id: composeState.wave_id,
    handle: composeState.handle,
  });

  if (ok) {
    composeState.body = '';
    toast('node released into the tide');
    state.view = 'feed';
    closeCompose();
    render();
  } else {
    release.disabled = false;
    release.textContent = 'release →';
  }
}

function closeCompose() {
  document.getElementById('composeOverlay')?.remove();
  if (state.view === 'compose') {
    state.view = 'feed';
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.view === 'feed');
    });
  }
}

/* ============================================================
   EVENTS
   ============================================================ */
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('[data-view]');
  if (!btn) return;
  const v = btn.dataset.view;
  if (v === 'compose') {
    state.view = 'compose';
    renderCompose();
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.view === 'compose');
    });
    return;
  }
  closeCompose();
  state.view = v;
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCompose();
});

/* ============================================================
   UTILS
   ============================================================ */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._to);
  toast._to = setTimeout(() => t.classList.remove('show'), 2400);
}

function currentPhaseLabel() {
  const h = new Date().getHours();
  if (h < 5)  return 'before-dawn';
  if (h < 9)  return 'waking';
  if (h < 13) return 'rising';
  if (h < 17) return 'cresting';
  if (h < 21) return 'dusk';
  return 'night';
}

init();
</script>
</body>
</html>
